<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡美學動態計數器 | Premium Counter</title>
    <meta name="description" content="一個設計精美、介面流暢且支援深淺色主題切換的現代化網頁計數器，專為測試與日常計數需求打造。">
    <!-- Google Fonts: Outfit & Noto Sans TC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Elements for Visual Depth -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <header class="app-header">
        <button id="btn-theme" class="theme-toggle-btn" aria-label="切換主題" title="切換深淺色模式">
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2"></path>
                <path d="M12 20v2"></path>
                <path d="m4.93 4.93 1.41 1.41"></path>
                <path d="m17.66 17.66 1.41 1.41"></path>
                <path d="M2 12h2"></path>
                <path d="M20 12h2"></path>
                <path d="m6.34 17.66-1.41 1.41"></path>
                <path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
            </svg>
        </button>
    </header>

    <main class="app-container">
        <section class="counter-card">
            <div class="card-header">
                <span class="badge">測試專用版本</span>
                <h1 class="title">極簡互動計數器</h1>
                <p class="subtitle">點擊下方按鈕進行增減，即時響應數據變化</p>
            </div>

            <div class="counter-display-wrapper">
                <div id="counter-value" class="counter-value">0</div>
            </div>

            <div class="counter-controls">
                <button id="btn-decrement" class="control-btn btn-minus" aria-label="減少數值" title="減少 (鍵盤下鍵或減號)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                
                <button id="btn-increment" class="control-btn btn-plus" aria-label="增加數值" title="增加 (鍵盤上鍵或加號)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>

            <div class="card-footer">
                <button id="btn-reset" class="reset-btn" aria-label="重設數值" title="重設為零 (鍵盤 R 鍵)">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="reset-icon">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                    </svg>
                    <span>重置計數</span>
                </button>
            </div>
        </section>

        <!-- Keyboard Shortcuts Helper -->
        <div class="shortcuts-helper">
            <span class="helper-tag">快捷鍵</span>
            <span class="helper-text">加：<code>+</code> 或 <code>↑</code></span>
            <span class="helper-dot">•</span>
            <span class="helper-text">減：<code>-</code> 或 <code>↓</code></span>
            <span class="helper-dot">•</span>
            <span class="helper-text">重置：<code>R</code></span>
        </div>
    </main>

    <footer class="app-footer">
        <p>© 2026 Interactive Lab. 設計精美的測試工具。</p>
    </footer>

    <!-- Logic Script -->
    <script type="module" src="app.js"></script>
</body>
</html>
